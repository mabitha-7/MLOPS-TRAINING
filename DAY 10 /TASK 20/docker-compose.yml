version: '3.8'

services:
  worker-safety-app:
    build: .
    container_name: worker-safety-project
    ports:
      - "5000:5000"
      - "3000:3000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./model:/app/model
      - ./video_processing:/app/video_processing
      - ./runs:/app/runs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
